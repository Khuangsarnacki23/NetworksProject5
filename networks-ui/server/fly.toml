# Fly.io config for socketsd — exposes raw TCP (not HTTP) on port 4642.
# The app name is filled in by Fly's launcher (web or CLI).
# Once deployed, use <your-app-name>.fly.dev : 4642 in the UI.

[build]

[[services]]
  internal_port = 4642
  protocol = "tcp"
  # Sleep when idle, wake on incoming TCP — costs ~nothing between uses.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 4642

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
